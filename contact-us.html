<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/middle.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body class="product-one-page"> 
    <header class="site-header header-white">
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <img src="images/Logo.svg" alt="Agridera Logo" class="main-logo">
            </a>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" placeholder="Search">
                    <button type="submit"><img src="images/ico_search.png" alt="search"></button>
                </div>
                <nav class="main-nav">
                    <ul class="nav justify-content-end">
                        <li><a href="index.html" class="nav-link">Home</a></li>
                        <li><a href="#" class="nav-link">Company Profile</a></li>
                        <li><a href="tomato.html" class="nav-link">Products</a></li>
                        <li><a href="#" class="nav-link">Services</a></li>
                        <li><a href="#" class="nav-link">R & D</a></li>
                        <li><a href="contact-us.html" class="nav-link pr-0">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <section class="contact-hero"></section>

        <section class="contact-main">
            <div class="container">
                <div class="contact-header">
                    <h1 class="page-title">Contact us</h1>
                    <img src="images/Union.png" alt="divider" class="title-dots">
                </div>

                <form class="contact-form">
                    <div class="form-grid">
                        <div class="form-col">
                            <div class="form-group"><label for="userName">Name *</label><input type="text" id="userName" required></div>
                            <div class="form-group"><label for="companyName">Company Name</label><input type="text" id="companyName"></div>
                            <div class="form-group"><label for="userPosition">Position</label><input type="text" id="userPosition"></div>
                            <div class="form-group"><label for="userCity">City</label><input type="text" id="userCity"></div>
                            <div class="form-group"><label for="userCountry">Country</label><input type="text" id="userCountry"></div>
                            <div class="form-group"><label for="userPhone">Telephone</label><input type="tel" id="userPhone"></div>
                            <div class="form-group"><label for="userEmail">Email *</label><input type="email" id="userEmail" required></div>
                        </div>

                        <div class="form-col">
                            <div class="form-group">
                                <label for="userRole">You are a</label>
                                <select id="userRole">
                                    <option>seed producer</option>
                                    <option>distributor</option>
                                    <option>farmer</option>
                                </select>
                            </div>
                            <div class="form-group"><label for="otherRole">If other, please specify</label><input type="text" id="otherRole"></div>
                            <div class="form-group"><label for="userInterest">You are interested in</label><textarea id="userInterest" rows="10"></textarea></div>

                            <div class="form-group captcha-section">
                                <label for="captchaCode">Please type this code</label>
                                <div class="captcha-row">
                                    <img src="images/image 12.png" alt="Captcha" class="captcha-img">
                                    <input type="text" id="captchaCode" class="captcha-input" required>
                                    <button type="submit" class="btn-submit">Send Message</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>

                <div class="address-section">
                    <div class="address-header">
                        <h3 class="address-title">Our Address</h3>
                        <img src="images/Rectangle 12.png" alt="divider" class="address-dots">
                    </div>
                    <div class="address-info">
                        <p>AGRIDERA Seeds & Agriculture Ltd.<br>
                        P.O Box 103,<br>
                        Gedera 70750, Israel.<br>
                        Telephone: <a href="tel:+97289449222" class="phone-link">+972 8 944 9222</a></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-main d-flex justify-content-between align-items-center py-4">
                <nav class="footer-links">
                    <a href="#">PROFILE</a><a href="#">MANAGEMENT</a><a href="#">PRODUCTS</a>
                    <a href="#">R&D</a><a href="#">LINKS</a><a href="#">SITEMAP</a><a href="#">CONTACT</a>
                </nav>
                <div class="footer-socials">
                    <a href="#" class="social-item"><img src="images/Ico_in.png" alt="LinkedIn"></a>
                    <a href="#" class="social-item"><img src="images/Ico_inst.png" alt="Instagram"></a>
                    <a href="#" class="social-item"><img src="images/Ico_tube.png" alt="YouTube"></a>
                    <a href="#" class="social-item"><img src="images/Ico_tw.png" alt="Twitter"></a>
                    <a href="#" class="social-item"><img src="images/Ico_fb.png" alt="Facebook"></a>
                </div>
            </div>
        </div>
        <div class="footer-copyright text-center">
            <p class="m-0 py-3">AGRIDERA SEEDS & AGRICULTURE LTD. © 2020</p>
        </div>
    </footer>
</body>
</html>
